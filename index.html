<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sütlü Mütlü Başakşehir</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#F8F3EE;
padding:20px;
color:#4b3425;
}

.logo{
text-align:center;
margin-top:20px;
}

.logo img{
width:140px;
border-radius:50%;
}

.logo h1{
margin-top:15px;
font-size:32px;
}

.logo p{
color:#8c6b4f;
}

.search{
margin:25px 0;
}

.search input{
width:100%;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
}

.card{

background:white;

border-radius:20px;

padding:20px;

margin-bottom:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

}

.price{

font-size:24px;

font-weight:bold;

margin-top:10px;

color:#b56a3c;

}

</style>

</head>

<body>

<div class="logo">

<img src="logo.png">

<h1>Sütlü Mütlü</h1>

<p>Başakşehir</p>

</div>

<div class="search">

<input type="text" placeholder="🔍 Menüde Ara">

</div>

<div class="card">

<h2>☕ Latte</h2>

<p>Espresso ve süt</p>

<div class="price">150 ₺</div>

</div>

<div class="card">

<h2>🍰 San Sebastian</h2>

<p>Orijinal tarif</p>

<div class="price">250 ₺</div>

</div>

</body>

</html>
